server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for static assets (Astro emits hashed filenames, so
    # immutable is safe — a content change produces a new filename).
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block source maps — they shouldn't ship publicly. `astro build` only
    # emits them when explicitly configured, but this is a safety net.
    location ~* \.map$ {
        return 404;
    }

    # Astro emits one .html file per route. Serve the file if it exists, then
    # try the same path with .html appended (so `/blog/foo` serves `/blog/foo.html`),
    # then fall back to the custom 404 page. No SPA-style index.html fallback —
    # this is a multi-page static site.
    location / {
        try_files $uri $uri/index.html $uri.html /404.html =404;
    }
}
