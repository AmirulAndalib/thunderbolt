name: Enterprise Deploy

on:
  workflow_call:
    inputs:
      action:
        type: string
        required: true
      platform:
        type: string
        default: 'fargate'
      region:
        type: string
        default: 'us-east-1'
      stack_name:
        type: string
        required: true
      version:
        type: string
        required: false
      subdomain:
        description: 'Full hostname for preview stacks (e.g. thunderbolt-pr-123.preview.thunderbolt.io). If set, Pulumi creates a Cloudflare CNAME and uses https://<subdomain> as publicUrl. Leave empty for enterprise stacks.'
        type: string
        required: false
      cloudflare_zone_id:
        description: 'Cloudflare zone ID for the subdomain. Required when subdomain is set.'
        type: string
        required: false
    outputs:
      url:
        description: 'Public URL of the deployed stack (subdomain if configured, raw ALB otherwise)'
        value: ${{ jobs.deploy.outputs.url }}
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - destroy
      platform:
        description: 'Deployment platform'
        required: true
        type: choice
        default: 'fargate'
        options:
          - fargate
          - k8s
      region:
        description: 'AWS region'
        required: true
        type: choice
        default: 'us-east-1'
        options:
          - us-east-1
          - us-west-2
          - eu-west-1
      stack_name:
        description: 'Pulumi stack name (e.g., demo-acme)'
        required: true
        type: string
      version:
        description: 'Image version to deploy (default: from package.json)'
        required: false
        type: string

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  deploy:
    if: inputs.action == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      url: ${{ steps.outputs.outputs.url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          fi

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Configure Pulumi stack
        working-directory: deploy/pulumi
        env:
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_STACK_NAME: ${{ inputs.stack_name }}
          INPUT_VERSION: ${{ steps.version.outputs.version }}
          INPUT_GHCR_PAT: ${{ secrets.GHCR_PAT }}
          INPUT_SUBDOMAIN: ${{ inputs.subdomain }}
          INPUT_CLOUDFLARE_ZONE_ID: ${{ inputs.cloudflare_zone_id }}
          INPUT_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pulumi config set platform "$INPUT_PLATFORM" -s "$INPUT_STACK_NAME" --non-interactive
          pulumi config set version "$INPUT_VERSION" -s "$INPUT_STACK_NAME" --non-interactive
          if [ -n "$INPUT_GHCR_PAT" ]; then
            pulumi config set --secret ghcrToken "$INPUT_GHCR_PAT" -s "$INPUT_STACK_NAME" --non-interactive
          fi
          if [ -n "$INPUT_SUBDOMAIN" ]; then
            [ -n "$INPUT_CLOUDFLARE_ZONE_ID" ] || { echo "subdomain is set but cloudflare_zone_id is missing"; exit 1; }
            [ -n "$INPUT_CLOUDFLARE_API_TOKEN" ] || { echo "subdomain is set but CLOUDFLARE_API_TOKEN secret is missing"; exit 1; }
            pulumi config set subdomain "$INPUT_SUBDOMAIN" -s "$INPUT_STACK_NAME" --non-interactive
            pulumi config set cloudflareZoneId "$INPUT_CLOUDFLARE_ZONE_ID" -s "$INPUT_STACK_NAME" --non-interactive
            pulumi config set --secret cloudflareApiToken "$INPUT_CLOUDFLARE_API_TOKEN" -s "$INPUT_STACK_NAME" --non-interactive
          fi

      - name: Deploy
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: up
          stack-name: ${{ inputs.stack_name }}
          work-dir: deploy/pulumi
          upsert: true

      - name: Capture stack outputs
        id: outputs
        working-directory: deploy/pulumi
        env:
          INPUT_STACK_NAME: ${{ inputs.stack_name }}
        run: |
          pulumi stack output --json -s "$INPUT_STACK_NAME"
          URL=$(pulumi stack output url -s "$INPUT_STACK_NAME" 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Stack URL: $URL"

  destroy:
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Install Pulumi dependencies
        working-directory: deploy/pulumi
        run: bun install --frozen-lockfile

      - name: Destroy
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: destroy
          stack-name: ${{ inputs.stack_name }}
          work-dir: deploy/pulumi
          remove: true
